<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Harmony Pro</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root {
            --bg: #050505;
            --card: rgba(255, 255, 255, 0.05);
            --accent: #f1c40f; /* CHANGE THIS TO YOUR FAVORITE COLOR */
        }
        * { user-select: none; -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { 
            background: var(--bg); color: white; font-family: -apple-system, sans-serif;
            margin: 0; display: flex; flex-direction: column; height: 100vh; 
            align-items: center; justify-content: center;
        }
        /* The "Glass" Card */
        .container {
            background: var(--card);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 30px;
            width: 85%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        #note-display { 
            font-size: 5rem; color: var(--accent); font-weight: 900; 
            margin: 20px 0; text-shadow: 0 0 25px var(--accent);
        }
        #harmony-label { font-size: 0.9rem; letter-spacing: 2px; color: #888; text-transform: uppercase; }
        #meter-container { 
            width: 100%; background: #111; height: 10px; 
            border-radius: 10px; margin-top: 20px; overflow: hidden;
        }
        #meter-fill { 
            width: 0%; height: 100%; background: var(--accent); 
            box-shadow: 0 0 15px var(--accent); transition: width 0.3s ease; 
        }
        #start-btn {
            background: var(--accent); color: white; border: none;
            padding: 18px 40px; border-radius: 15px; font-weight: bold;
            font-size: 1.1rem; cursor: pointer; transition: transform 0.2s;
        }
        #start-btn:active { transform: scale(0.95); }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div id="overlay">
        <button id="start-btn">START ANALYZER</button>
    </div>
    <div id="main-ui" class="container hidden">
        <div id="harmony-label">Live Analysis</div>
        <div id="note-display">---</div>
        <div id="harmony-text">Score: 0%</div>
        <div id="meter-container"><div id="meter-fill"></div></div>
    </div>
    <script src="app.js"></script>
</body>
</html>
