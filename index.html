<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Harmony Pro</title>
    <style>
        :root {
            --bg: #0a0a0c;
            --card: rgba(255, 255, 255, 0.06);
            --accent: #3498db;
            --text-secondary: #888;
        }
        * { user-select: none; -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { 
            background: var(--bg); color: white; font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0; display: flex; flex-direction: column; height: 100vh; 
            align-items: center; justify-content: center; overflow: hidden;
        }
        .container {
            background: var(--card);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px 20px;
            border-radius: 35px;
            width: 90%;
            max-width: 400px;
            text-align: center;
        }
        #chord-name { font-size: 1.2rem; color: var(--accent); font-weight: 600; margin-bottom: 10px; height: 1.5rem; }
        #note-display { font-size: 4.5rem; color: white; font-weight: 900; margin: 10px 0; }
        #harmony-text { font-size: 1rem; color: var(--text-secondary); margin-top: 20px; }
        #meter-container { width: 100%; background: rgba(255,255,255,0.1); height: 8px; border-radius: 10px; margin-top: 15px; overflow: hidden; }
        #meter-fill { width: 0%; height: 100%; background: var(--accent); transition: width 0.3s ease; }
        .controls { margin-top: 35px; display: flex; gap: 10px; justify-content: center; }
        button {
            padding: 16px 24px; border-radius: 18px; font-weight: bold;
            cursor: pointer; transition: all 0.2s; border: none;
        }
        #start-btn { background: var(--accent); color: white; width: 100%; }
        #stop-btn { background: #e74c3c; color: white; }
        #reset-btn { background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div id="main-ui" class="container">
        <div id="chord-name">Ready...</div>
        <div id="note-display">---</div>
        
        <div id="meter-container"><div id="meter-fill"></div></div>
        <div id="harmony-text">Harmony Score: 0%</div>

        <div class="controls">
            <button id="start-btn">START RECORDING</button>
            <button id="stop-btn" class="hidden">STOP</button>
            <button id="reset-btn" class="hidden">RESET</button>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
